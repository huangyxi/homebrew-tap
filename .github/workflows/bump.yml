name: brew bump

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  HOMEBREW_TAP: huangyxi/tap

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Untap official Homebrew tap
        run: |
          brew untap homebrew/core || true
          brew untap homebrew/cask || true
      - name: Tap the custom tap
        run: |
          brew tap ${{ env.HOMEBREW_TAP }}
      - name: Bump version and create PR
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          brew bump --tap ${{ env.HOMEBREW_TAP }} --open-pr --no-fork

# Ref https://github.com/loozhengyuan/homebrew-tap/blob/main/.github/workflows/bump.yml
